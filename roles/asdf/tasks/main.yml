---
- name: install asdf
  homebrew:
    name: asdf
    state: present

- name: install build dependencies
  homebrew:
    name: "{{ asdf['build_dependencies'] }}"
    state: present
  when: asdf['build_dependencies'] | length > 0

- name: add config to rc
  blockinfile:
    block: |
      export ASDF_DATA_DIR="${ASDF_DATA_DIR:-$HOME/.asdf}"
      export PATH="{{ brew['prefix'] }}/bin:$ASDF_DATA_DIR/shims:$PATH"
    marker: "# {mark} {{ role_path|basename }} add config to rc"
    path: ~/.zshrc

- name: manage config
  template:
    dest: ~/.asdfrc
    src: .asdfrc.j2

- name: install plugins
  command: "{{ brew['prefix'] }}/bin/asdf plugin add {{ item.name }}"
  args:
    creates: "~/.asdf/plugins/{{ item.name }}"
  environment: &asdf_environment
    ASDF_DATA_DIR: "{{ ansible_env.HOME }}/.asdf"
    PATH: "{{ brew['prefix'] }}/bin:{{ ansible_env.HOME }}/.asdf/shims:{{ ansible_env.PATH }}"
  with_items: "{{ asdf['globals'] }}"

- name: create global versions
  file:
    path: ~/.tool-versions
    state: touch
    modification_time: preserve
    access_time: preserve

- name: get global versions
  shell: cat ~/.tool-versions
  register: global_versions

- name: install latest versions
  command: "{{ brew['prefix'] }}/bin/asdf install {{ item.name }} latest"
  environment: *asdf_environment
  with_items:
    - "{{ asdf['globals'] }}"
  when:
    - item.version is not defined
    - global_versions.stdout.find(item.name) == -1

- name: install specific versions
  command: "{{ brew['prefix'] }}/bin/asdf install {{ item.name }} {{ item.version }}"
  args:
    creates: "~/.asdf/installs/{{ item.name }}/{{ item.version }}"
  environment: *asdf_environment
  with_items:
    - "{{ asdf['globals'] }}"
  when: item.version is defined

- name: set global to latest versions
  command: "{{ brew['prefix'] }}/bin/asdf global {{ item.name }} latest"
  environment: *asdf_environment
  with_items:
    - "{{ asdf['globals'] }}"
  when:
    - item.version is not defined
    - global_versions.stdout.find(item.name) == -1
